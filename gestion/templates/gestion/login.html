{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Los Robles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- ESTILOS PARA EL FONDO DE PANTALLA -->
    <style>
        body {
            /* Aquí cargamos la imagen de fondo de Django */
            background-image: url("{% static 'img/fondo_login.png' %}");
            
            /* Hacemos que cubra toda la pantalla sin perder proporción */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Opcional: Esto fija el fondo si alguien hace scroll */
            background-attachment: fixed;
            
            min-height: 100vh;
        }
        
        /* Opcional: Le damos un poco de transparencia a la tarjeta blanca para que el fondo se luzca más */
        .card-login {
            background-color: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>
<body class="d-flex align-items-center">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                
                <!-- Le agregué la clase card-login que creamos arriba -->
                <div class="card card-login shadow border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h2 class="text-success fw-bold"> Los Robles</h2>
                            <p class="text-muted">Portal de Enfermería</p>
                        </div>

                        <!-- MANEJO DE ERRORES DE DJANGO -->
                        {% if form.errors or messages %}
                            <div class="alert alert-danger py-2 small">
                                RUT o contraseña incorrectos. Por favor, revisa los datos.
                            </div>
                        {% endif %}

                        <form method="POST" action="">
                            {% csrf_token %}
                            
                             <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">RUT DE USUARIO</label>
                                <!-- USANDO TU CONFIGURACIÓN DE FORMS.PY -->
                                {{ form.username }}
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">CONTRASEÑA</label>
                                <!-- USANDO TU CONFIGURACIÓN DE FORMS.PY -->
                                {{ form.password }}
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100 fw-bold py-2">
                                Iniciar Sesión
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
