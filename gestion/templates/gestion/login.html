<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Los Robles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h2 class="text-success fw-bold"> Los Robles</h2>
                            <p class="text-muted">Portal de Enfermería</p>
                        </div>
                        {% if form.errors %}
                            <div class="alert alert-danger py-2 small">
                                RUT o contraseña incorrectos. Por favor, revisa los datos.
                            </div>
                        {% endif %}
                        <form method="POST" action="">
                            {% csrf_token %}
                             <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">RUT DE USUARIO</label>
                                <input type="text" name="username" class="form-control" placeholder="Ej: 12345678-9" required autofocus>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">CONTRASEÑA</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100 fw-bold py-2">
                                Iniciar Sesión
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
