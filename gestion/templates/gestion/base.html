{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Robles - Sistema Clínico</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS global -->
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

    {% block css %}{% endblock %}
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark" style="background: linear-gradient(90deg, #2c5cc5, #3a7bd5);">
        <div class="container d-flex justify-content-between align-items-center">
            
            <!-- IZQUIERDA -->
            <a class="navbar-brand fw-bold" href="{% url 'gestion:dashboard' %}">
                Los Robles
            </a>

            <!-- DERECHA -->
            <div class="d-flex align-items-center gap-3">

                <span class="text-white d-flex align-items-center gap-2">
                    <i class="bi bi-person-circle fs-4"></i>
                    <span class="fw-semibold">{{ request.user }}</span>
                </span>

                <a href="{% url 'gestion:logout' %}" class="btn btn-light btn-sm px-3">
                    Salir
                </a>

            </div>

        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="container mt-4">

        <!-- MENSAJES -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block contenido %}
        {% endblock %}
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block js %}{% endblock %}

</body>
</html>
